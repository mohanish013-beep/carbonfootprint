<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Track, calculate, and neutralize your carbon footprint with interactive calculators, daily sustainability actions, and a premium digital eco-sphere.">
  <meta name="theme-color" content="#080B11">
  <title>AeroCarbon - Track & Reduce Your Carbon Footprint</title>
  
  <!-- Open Graph / Vercel Previews -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="AeroCarbon - Track & Reduce Your Carbon Footprint">
  <meta property="og:description" content="Interactive tools and personalized guidelines to achieve a low-carbon, healthy lifestyle.">
  
  <link rel="stylesheet" href="./index.css">
</head>
<body>
  
  <div class="app-container">
    <!-- Sidebar Navigation -->
    <aside class="sidebar" role="navigation" aria-label="Main Navigation">
      <div class="brand-section">
        <svg class="brand-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8z"></path>
          <path d="M12 6a6 6 0 0 0-6 6"></path>
        </svg>
        <span class="brand-name">AeroCarbon</span>
      </div>
      
      <nav class="nav-menu">
        <div class="nav-item">
          <button id="nav-dashboard" class="nav-link active" aria-controls="app-content">
            <svg viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="9" rx="1"></rect>
              <rect x="14" y="3" width="7" height="5" rx="1"></rect>
              <rect x="14" y="12" width="7" height="9" rx="1"></rect>
              <rect x="3" y="16" width="7" height="5" rx="1"></rect>
            </svg>
            <span>Dashboard</span>
          </button>
        </div>
        <div class="nav-item">
          <button id="nav-calculator" class="nav-link" aria-controls="app-content">
            <svg viewBox="0 0 24 24">
              <rect x="4" y="2" width="16" height="20" rx="2" ry="2" stroke="currentColor" stroke-width="2" fill="none"></rect>
              <line x1="9" y1="18" x2="15" y2="18" stroke="currentColor" stroke-width="2"></line>
              <line x1="9" y1="14" x2="15" y2="14" stroke="currentColor" stroke-width="2"></line>
              <line x1="9" y1="10" x2="15" y2="10" stroke="currentColor" stroke-width="2"></line>
              <line x1="9" y1="6" x2="15" y2="6" stroke="currentColor" stroke-width="2"></line>
            </svg>
            <span>Calculator</span>
          </button>
        </div>
        <div class="nav-item">
          <button id="nav-actions" class="nav-link" aria-controls="app-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
            <span>Action Tracker</span>
          </button>
        </div>
        <div class="nav-item">
          <button id="nav-insights" class="nav-link" aria-controls="app-content">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
            </svg>
            <span>Insights & Simulator</span>
          </button>
        </div>
      </nav>
      
      <div class="sidebar-footer">
        <div class="user-status-card">
          <div class="user-avatar-placeholder" id="user-avatar">GO</div>
          <div class="user-info">
            <span class="user-name">Green Citizen</span>
            <span class="user-rank" id="user-rank">Eco Novice</span>
          </div>
        </div>
      </div>
    </aside>
    
    <!-- Main Content Container -->
    <main class="main-content">
      <!-- Dynamic Top Bar -->
      <header class="top-bar">
        <div class="page-title">
          <h1 id="page-heading">Dashboard</h1>
          <p id="page-subheading">Your climate status at a glance.</p>
        </div>
      </header>
      
      <!-- Mount container for Javascript components -->
      <section id="app-content" role="region" aria-live="polite">
        <!-- Rendered modules append contents here -->
      </section>
    </main>
  </div>
  
  <!-- Dynamic Alert Toast System -->
  <div id="toast-container" class="toast-container" aria-live="assertive"></div>
  
  <!-- Module Entry Script -->
  <script type="module" src="./src/main.js"></script>
</body>
</html>
